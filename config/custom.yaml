zotero:
  user_id: ${oc.env:ZOTERO_ID}
  api_key: ${oc.env:ZOTERO_KEY}
  include_path: null # Or set a list of glob patterns, e.g. ["2026/survey/**","2026/reading-group/**"]

email:
  sender: ${oc.env:SENDER}
  receiver: ${oc.env:RECEIVER}
  smtp_server: smtp.qq.com
  smtp_port: 465
  sender_password: ${oc.env:SENDER_PASSWORD}

llm:
  api:
    key: ${oc.env:OPENAI_API_KEY}
    base_url: ${oc.env:OPENAI_API_BASE}
  generation_kwargs:
    model: mimo-v2.5
  language: Chinese
  tldr_style: short_summary

idea:
  enabled: true
  mode: research
  max_num: 3
  daily_summary_num: 3
  context_paper_num: 5
  show_per_paper: false
  focus: "优先生成能启发后续研究、改进当前工作流、或能快速验证的新实验想法。"

source:
  arxiv:
    category: ["cs.AI","cs.CV","cs.LG","cs.CL","cs.DC","cs.RO","cs.MA","cs.OS"]

executor:
  debug: ${oc.env:DEBUG,null}
  source: ['arxiv']
